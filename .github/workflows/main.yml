name: LibGuard CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        run: |
          PYTHONPATH=. pytest tests/ -v --cov=scanner --cov-report=term-missing

  monitoring:
    name: Verify Logging Setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Verify logging is configured
        run: |
          PYTHONPATH=. python -c "import scanner.scanner; print('✅ Logging configured successfully')"

  scan-demo:
    name: Demo Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run scanner on sample file
        run: |
          python scanner/scanner.py sample/requirements.txt || true